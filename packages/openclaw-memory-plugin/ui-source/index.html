<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouAreMemory</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="appScrim" class="app-scrim"></div>

      <aside class="nav-rail" id="navRail">
        <div class="nav-header">
          <div class="nav-brand">
            <div class="brand-mark">YM</div>
            <div>
              <p class="overline">Memory</p>
              <h1>YouAreMemory</h1>
            </div>
          </div>
          <button id="navCloseBtn" class="icon-btn nav-close" type="button">关闭</button>
        </div>

        <nav id="levelTabs" class="nav-list">
          <button class="nav-item active" data-level="l1" type="button">
            <span class="nav-label">L1 窗口</span>
            <span class="nav-count" data-count-for="l1">0</span>
          </button>
          <button class="nav-item" data-level="l2_project" type="button">
            <span class="nav-label">L2 项目</span>
            <span class="nav-count" data-count-for="l2_project">0</span>
          </button>
          <button class="nav-item" data-level="l2_time" type="button">
            <span class="nav-label">L2 时间</span>
            <span class="nav-count" data-count-for="l2_time">0</span>
          </button>
          <button class="nav-item" data-level="l0" type="button">
            <span class="nav-label">L0 会话</span>
            <span class="nav-count" data-count-for="l0">0</span>
          </button>
          <button class="nav-item" data-level="profile" type="button">
            <span class="nav-label">全局画像</span>
            <span class="nav-count" data-count-for="profile">0</span>
          </button>
        </nav>

        <div class="nav-footer">
          <span class="nav-footer-label">最近索引</span>
          <strong id="navLastIndexed">等待索引</strong>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-leading">
            <button id="navToggleBtn" class="icon-btn nav-toggle" type="button">菜单</button>
            <div>
              <p class="overline">Dashboard</p>
              <h2>记忆看板</h2>
              <p id="activityText" class="activity-text">等待操作</p>
            </div>
          </div>

          <div class="toolbar">
            <span id="statusPill" class="status-pill">等待索引</span>
            <button id="refreshBtn" class="tool-btn" type="button">刷新</button>
            <button id="buildNowBtn" class="tool-btn primary" type="button">立即构建</button>
            <button id="settingsToggleBtn" class="tool-btn" type="button">设置</button>
            <button id="retrieveToggleBtn" class="tool-btn" type="button">检索调试</button>
            <button id="detailToggleBtn" class="tool-btn" type="button">详情</button>
          </div>
        </header>

        <section id="overviewCards" class="overview-strip"></section>

        <section class="stream-panel">
          <div class="panel-head">
            <div>
              <h3 id="browserTitle">L1 窗口</h3>
              <p id="browserMeta" class="panel-meta">0 条</p>
            </div>

            <div class="search-row">
              <input
                id="listQueryInput"
                type="text"
                autocomplete="off"
                placeholder="搜索当前层级"
              />
              <button id="listSearchBtn" class="tool-btn" type="button">搜索</button>
            </div>
          </div>

          <ul id="entryList" class="entry-stream"></ul>
        </section>
      </main>
    </div>

    <aside class="side-drawer detail-drawer" id="detailPanel">
      <div class="drawer-header">
        <div>
          <p class="overline">Detail</p>
          <h3 id="detailTitle">记录详情</h3>
        </div>
        <button id="detailCloseBtn" class="icon-btn" type="button">关闭</button>
      </div>
      <div id="detailMeta" class="detail-meta"></div>
      <div id="detailBody" class="detail-body"></div>
    </aside>

    <aside class="side-drawer settings-drawer" id="settingsPanel">
      <div class="drawer-header">
        <div>
          <p class="overline">Settings</p>
          <h3>索引设置</h3>
        </div>
        <button id="settingsCloseBtn" class="icon-btn" type="button">关闭</button>
      </div>

      <div class="drawer-section">
        <label class="settings-field">
          <span>自动构建间隔（分钟）</span>
          <input id="autoIndexIntervalInput" type="number" min="0" step="1" placeholder="60" />
        </label>
      </div>

      <div class="drawer-actions">
        <button id="saveSettingsBtn" class="tool-btn primary wide" type="button">保存设置</button>
      </div>

      <div class="drawer-section drawer-danger">
        <button id="clearMemoryBtn" class="tool-btn danger wide" type="button">清空并重建</button>
      </div>
    </aside>

    <aside class="side-drawer retrieve-drawer" id="retrievePanel">
      <div class="drawer-header">
        <div>
          <p class="overline">Recall</p>
          <h3>检索调试</h3>
        </div>
        <button id="retrieveCloseBtn" class="icon-btn" type="button">关闭</button>
      </div>

      <div class="drawer-section">
        <div class="retrieve-input">
          <textarea
            id="queryInput"
            rows="4"
            placeholder="输入问题，例如：这个项目最近进展到哪一步了？"
          ></textarea>
          <button id="retrieveBtn" class="tool-btn primary wide" type="button">开始检索</button>
        </div>
      </div>

      <div class="drawer-section">
        <div id="retrieveSummary" class="summary-chip">尚未检索</div>
        <div id="retrieveTimeline" class="retrieval-timeline"></div>
        <details class="context-block">
          <summary>上下文</summary>
          <pre id="retrieveResult"></pre>
        </details>
      </div>
    </aside>

    <script type="module" src="./app.js"></script>
  </body>
</html>
